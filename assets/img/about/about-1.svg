<svg id="rms-svg" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&amp;display=swap');

            /* 🌟 SAF CSS BASINÇ AKIŞ ANİMASYONLARI */
            @keyframes flowInletAnimation {
            from { stroke-dashoffset: 0; }
            to { stroke-dashoffset: -60; }
            }

            @keyframes flowOutletAnimation {
            from { stroke-dashoffset: 0; }
            to { stroke-dashoffset: -200; }
            }

            @keyframes needleJitterAnimation {
            0% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
            100% { transform: rotate(-5deg); }
            }

            .label-text {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.1em;
            fill: #94A3B8;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            }

            .value-text {
            font-size: 18px;
            font-weight: 300;
            fill: #E2E8F0;
            font-family: 'Inter', sans-serif;
            }

            .status-glow {
            filter: drop-shadow(0 0 8px #00FFFF);
            }

            /* Giriş: Sık ve Hızlı Akış (Yüksek Basınç) */
            .flow-inlet {
            stroke-dasharray: 20, 10;
            stroke: #00FFFF;
            animation: flowInletAnimation 0.8s linear infinite;
            }

            /* Çıkış: Seyrek ve Yavaş Akış (Düşük Basınç) */
            .flow-outlet {
            stroke-dasharray: 40, 60;
            stroke: #22D3EE;
            opacity: 0.7;
            animation: flowOutletAnimation 3.5s linear infinite;
            }

            /* Regülatör İbresinin Canlı Titreşimi */
            #needle-group {
            transform-origin: 0px 0px;
            animation: needleJitterAnimation 2.5s ease-in-out infinite;
            }
        </style>

        <linearGradient id="pipeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.03)" />
            <stop offset="50%" stop-color="rgba(255,255,255,0.12)" />
            <stop offset="100%" stop-color="rgba(255,255,255,0.03)" />
        </linearGradient>

        <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Ana Boru Hattı Şasisi (Arka Plan Tamamen Şeffaftır) -->
    <g id="pipeline-group" transform="translate(0, 350)">
        <!-- Üst ve Alt İnce Teknik Kılavuz Çizgileri -->
        <path d="M 50 -40 L 450 -40 Q 500 -40 500 -90 L 500 -120" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2" />
        <path d="M 50 40 L 450 40 Q 550 40 550 90 L 550 120" fill="none" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2" opacity="0.3" />

        <!-- Yatay Ana Boru Gövdesi -->
        <rect x="0" y="-35" width="1200" height="70" fill="url(#pipeGradient)" rx="4" />
        <line x1="0" y1="-35" x2="1200" y2="-35" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" />
        <line x1="0" y1="35" x2="1200" y2="35" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" />

        <!-- Gaz Akışı: Giriş (Yüksek Basınç - Canlı & Hızlı) -->
        <g id="inlet-flow" filter="url(#neon-glow)">
            <line x1="0" y1="-15" x2="520" y2="-15" class="flow-inlet" stroke-width="4" />
            <line x1="0" y1="0" x2="520" y2="0" class="flow-inlet" stroke-width="4" />
            <line x1="0" y1="15" x2="520" y2="15" class="flow-inlet" stroke-width="4" />
        </g>

        <!-- Gaz Akışı: Çıkış (Düşük Basınç - Regüle Edilmiş & Sakin) -->
        <g id="outlet-flow">
            <line x1="680" y1="-15" x2="1200" y2="-15" class="flow-outlet" stroke-width="3" />
            <line x1="680" y1="0" x2="1200" y2="0" class="flow-outlet" stroke-width="3" />
            <line x1="680" y1="15" x2="1200" y2="15" class="flow-outlet" stroke-width="3" />
        </g>
    </g>

    <!-- Merkez Üssü: RMS Basınç Regülatör Modülü -->
    <g id="regulator-widget" transform="translate(600, 350)">
        <!-- Kadran Gövdesi -->
        <circle r="90" fill="#0F172A" stroke="rgba(255, 255, 255, 0.15)" stroke-width="4" />
        <circle r="82" fill="none" stroke="#00FFFF" stroke-width="1" stroke-dasharray="2, 4" opacity="0.5" />

        <!-- Saf CSS ile Oluşturulmuş Teknik Ölçüm Çizgileri (Ticks) -->
        <g id="ticks">
            <line x1="0" y1="-75" x2="0" y2="-82" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2" transform="rotate(-120)" />
            <line x1="0" y1="-75" x2="0" y2="-82" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2" transform="rotate(-105)" />
            <line x1="0" y1="-75" x2="0" y2="-82" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2" transform="rotate(-90)" />
            <line x1="0" y1="-75" x2="0" y2="-82" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2" transform="rotate(-75)" />
            <line x1="0" y1="-75" x2="0" y2="-82" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2" transform="rotate(-60)" />
            <line x1="0" y1="-75" x2="0" y2="-82" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2" transform="rotate(-45)" />
            <line x1="0" y1="-75" x2="0" y2="-82" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2" transform="rotate(-30)" />
            <line x1="0" y1="-75" x2="0" y2="-82" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2" transform="rotate(-15)" />
            <line x1="0" y1="-75" x2="0" y2="-82" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2" transform="rotate(0)" />
            <line x1="0" y1="-75" x2="0" y2="-82" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2" transform="rotate(15)" />
            <line x1="0" y1="-75" x2="0" y2="-82" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2" transform="rotate(30)" />
            <line x1="0" y1="-75" x2="0" y2="-82" stroke="rgba(255, 255, 255, 0.15)" stroke-width="2" transform="rotate(45)" />
            <!-- Kritik Basınç Bölgesi Çizgileri (Kırmızımsı) -->
            <line x1="0" y1="-75" x2="0" y2="-82" stroke="rgba(255,0,0,0.5)" stroke-width="2" transform="rotate(60)" />
            <line x1="0" y1="-75" x2="0" y2="-82" stroke="rgba(255,0,0,0.5)" stroke-width="2" transform="rotate(75)" />
            <line x1="0" y1="-75" x2="0" y2="-82" stroke="rgba(255,0,0,0.5)" stroke-width="2" transform="rotate(90)" />
            <line x1="0" y1="-75" x2="0" y2="-82" stroke="rgba(255,0,0,0.5)" stroke-width="2" transform="rotate(105)" />
            <line x1="0" y1="-75" x2="0" y2="-82" stroke="rgba(255,0,0,0.5)" stroke-width="2" transform="rotate(120)" />
        </g>

        <!-- Canlı Titreyen İbre Katmanı -->
        <g id="needle-group">
            <line x1="0" y1="0" x2="0" y2="-70" stroke="#00FFFF" stroke-width="3" stroke-linecap="round" class="status-glow" />
            <circle r="6" fill="#00FFFF" />
        </g>

        <!-- Dijital Değer Metinleri -->
        <text y="48" text-anchor="middle" class="value-text" style="font-weight: 600;">4.20 bar</text>
        <text y="68" text-anchor="middle" font-size="10" fill="#94A3B8" style="font-family: 'Inter', sans-serif; letter-spacing: 2px; font-weight: bold;">REGULATING</text>
    </g>

    <!-- Sol Giriş Bilgi Etiketleri -->
    <g transform="translate(100, 260)">
        <text class="label-text">Giriş Basıncı (Inlet)</text>
        <text y="25" class="value-text" fill="#00FFFF" style="font-weight: bold;">19.5 Bar</text>
        <path d="M 0 35 L 150 35" stroke="#00FFFF" stroke-width="1" opacity="0.6" />
    </g>

    <!-- Sağ Çıkış Bilgi Etiketleri -->
    <g transform="translate(950, 260)">
        <text class="label-text" text-anchor="end">Çıkış Basıncı (Outlet)</text>
        <text y="25" x="0" class="value-text" text-anchor="end" fill="#22D3EE" style="font-weight: bold;">4.00 Bar</text>
        <path d="M -150 35 L 0 35" stroke="#22D3EE" stroke-width="1" opacity="0.6" />
    </g>

    <!-- Kurumsal Metadata Bilgileri -->
    <text x="50" y="60" class="label-text" style="font-size: 18px; fill: #fff; font-weight: bold;">RMS-A/B/C STATIONS</text>
    <text x="50" y="85" class="label-text" style="font-size: 11px; fill: #64748b;">NART GAZ // HIGH-TECH REGULATION SYSTEM</text>

    <!-- Sağ Üst Canlı Veri Sinyal Rozeti -->
    <g transform="translate(1030, 45)">
        <rect width="120" height="30" rx="15" fill="rgba(0,255,255,0.06)" stroke="#00FFFF" stroke-width="1" />
        <circle cx="20" cy="15" r="4" fill="#00FFFF">
            <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" />
        </circle>
        <text x="35" y="19" fill="#00FFFF" font-family="'Inter', sans-serif" font-size="10" font-weight="bold" letter-spacing="1">LIVE DATA</text>
    </g>
</svg>
